name: CI

# Roda a cada push e em pull request pra main. A main precisa ficar sempre verde: é a branch
# que o Streamlit Community Cloud faz deploy, então um teste quebrado aqui é um deploy em risco.
on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # mesma versão do desenvolvimento e do deploy
          cache: pip               # cacheia os pacotes entre runs (resolve por requirements.txt)

      - name: Instala dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Roda os testes
        run: pytest
